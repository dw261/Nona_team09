{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - &#xB85C;&#xADF8;&#xC778;</title>
    <link rel="stylesheet" href="{% static 'post/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>--:--</span>
        <div class="status-icons">
          <span>|</span><span>&#x2301;</span><span>&#x25AD;</span>
        </div>
      </header>

      <main class="create-page">
        <header class="page-header">
          <h1>&#xB85C;&#xADF8;&#xC778;</h1>
        </header>

        <form class="create-form auth-form" method="post">
          {% csrf_token %}

          {% if form.non_field_errors %}
            <section class="form-card auth-error-card">
              {{ form.non_field_errors }}
            </section>
          {% endif %}

          <section class="form-card auth-card">
            <label class="info-row">
              <span class="info-label">&#xC804;&#xD654;&#xBC88;&#xD638;</span>
              <input
                class="info-input"
                type="text"
                name="phone_number"
                value="{{ form.phone_number.value|default:'' }}"
                required
              />
            </label>
            {{ form.phone_number.errors }}

            <label class="info-row">
              <span class="info-label">&#xBE44;&#xBC00;&#xBC88;&#xD638;</span>
              <input class="info-input" type="password" name="password" required />
            </label>
            {{ form.password.errors }}
          </section>

          <button class="submit-btn" type="submit">&#xB85C;&#xADF8;&#xC778;</button>
          <a class="delete-btn" href="{% url 'accounts:signup' %}">&#xCC98;&#xC74C;&#xC774;&#xC5D0;&#xC694;</a>
        </form>
      </main>
    </div>
    <script src="{% static 'post/js/status-time.js' %}"></script>
  </body>
</html>
