{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>

<body>
  <div class="mobile-wrap">

        {{ form.password }}

        &#xC544;&#xC9C1; &#xACC4;&#xC815;&#xC774; &#xC5C6;&#xB098;&#xC694;?

</body>
</html>
