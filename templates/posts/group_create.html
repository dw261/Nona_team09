{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 공구 개설</title>

    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span>
          <span>⌁</span>
          <span>▭</span>
        </div>
      </header>

      <main class="create-page">
        <header class="page-header">
          <a href="{% url 'posts:group_list' %}" class="back-btn">‹</a>
          <h1>공구 개설</h1>
        </header>

        <form class="create-form" method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <section class="form-card title-card">
            <label class="image-upload">
              사진 추가<br />
              <span>(최대 5장)</span>
              <input
                type="file"
                name="images"
                accept="image/*"
                multiple
                hidden
              />
            </label>

            <div class="title-input-area">
              <div class="input-count-row">
                <input
                  type="text"
                  name="title"
                  maxlength="30"
                  placeholder="공구 제목을 입력해주세요"
                />
                <span>0 / 30</span>
              </div>

              <textarea
                name="content"
                maxlength="100"
                placeholder="유통기한과 구매수량을 입력해주세요&#10;(필수)"
              ></textarea>

              <div class="textarea-count">0 / 100</div>
            </div>
          </section>

          <section class="form-card">
            <div class="card-title-row">
              <h2>카테고리 선택</h2>
              <button
                type="button"
                class="small-icon-btn"
                id="categoryOpenBtn"
                aria-label="카테고리 선택 열기"
              >
                ⌕
              </button>
            </div>

            <div class="category-list">
            <input
              type="hidden"
              name="category"
              id="categoryInput"
              value="{{ categories.0.pk }}"
            />

              {% for category in categories %}
              <button
                type="button"
                class="category"
                data-category="{{ category.pk }}"
                data-label="{{ category.name }}"
              >
                {{ category.name }}
              </button>
              {% endfor %}
            </div>
          </section>

          <section class="form-card people-card">
            <div class="people-head">
              <div>
                <h2>최소 모집인원 <span>4명 모집</span></h2>
                <p>조건이 되면 자동으로 모집은 마감돼요.</p>
              </div>

              <div class="people-control">
                <button type="button" id="minusBtn">−</button>
                <strong id="peopleCount">4명</strong>
                <button type="button" id="plusBtn">＋</button>
              </div>
            </div>

            <input
              type="range"
              name="min_members"
              min="2"
              max="10"
              value="4"
              id="peopleRange"
            />
          </section>

          <section class="form-card info-card compact-info-card">
            <button type="button" class="info-row">
              <span>♙ 거래장소</span>
              <strong>태릉입구역 ›</strong>
            </button>

            <button type="button" class="info-row">
              <span>⏰ 모집마감시간</span>
              <strong>오늘 18 : 30</strong>
            </button>
          </section>

          <section class="form-card link-card">
            <h2>실제 판매 링크</h2>
            <p>실제 상품 링크를 붙여주세요.</p>

            <div class="link-input-box">
              <input type="url" name="link" placeholder="https" />
              <button type="button">링크 붙여넣기</button>
            </div>
            <!-- input 없는 필드들 hidden으로 추가 (임시) -->
            <input type="hidden" name="location" value="미정" />
            <input type="hidden" name="deadline" value="2099-12-31T00:00" />
            <input type="hidden" name="price_per" value="0" />
          </section>

          <button class="submit-btn" type="submit">공구 시작하기</button>
          <button
            class="delete-btn"
            type="button"
            id="cancelBtn"
            data-url="{% url 'posts:group_list' %}"
          >
            취소할게요
          </button>
        </form>
      </main>

      <div class="dimmed" id="dimmed"></div>

      <section class="bottom-sheet category-bottom-sheet" id="categorySheet">
        <h3>카테고리 선택</h3>

        <label class="category-search">
          <input
            type="search"
            placeholder="카테고리 검색"
            id="categorySearchInput"
          />
          <span>⌕</span>
        </label>

        <div class="category-sheet-options">
          {% for category in categories %}
          <button
            class="category-sheet-option"
            type="button"
            data-category="{{ category.pk }}"
            data-label="{{ category.name }}"
          >
            <span>{{ category.name }}</span>
            <strong></strong>
          </button>
          {% endfor %}
        </div>

        <div class="category-sheet-actions">
          <button
            class="category-reset-btn"
            id="categoryResetBtn"
            type="button"
          >
            초기화
          </button>

          <button
            class="category-apply-btn"
            id="categoryApplyBtn"
            type="button"
          >
            적용하기
          </button>
        </div>
      </section>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
