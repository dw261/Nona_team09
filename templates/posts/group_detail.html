{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 공구 게시물</title>
    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span><span>⌁</span><span>▭</span>
        </div>
      </header>

      <main class="detail-page">
        <header class="page-header detail-header">
          <a href="{% url 'group_list' %}" class="back-btn">‹</a>
          <h1>공구 게시물</h1>
          <button class="detail-menu-btn" type="button" aria-label="더보기">
            ☰
          </button>
        </header>

        <section class="detail-card detail-summary-card">
          <div class="detail-thumb carrot"></div>
          <div class="detail-summary">
            <span class="detail-category">야채</span>
            <h2>양배추랑 당근 같이 사요!</h2>
            <p>같이 소분해서 싸게 같이 구매해요</p>

            <div class="seller-row">
              <div class="seller-avatar">○</div>
              <div>
                <strong>신다연</strong>
                <span>서울특별시 노원구</span>
              </div>
              <em>신뢰도 70%</em>
            </div>
          </div>
        </section>

        <section class="detail-card progress-card">
          <div class="detail-section-head">
            <h2>진행상황</h2>
            <strong>2/4명</strong>
          </div>
          <div class="detail-progress">
            <span style="width: 50%"></span>
            <i></i>
          </div>
          <p>같이 참여할 사람을 기다리고 있어요</p>
        </section>

        <section class="detail-card detail-info-card">
          <div class="detail-info-row">
            <span><i>▤</i> 1/N 금액</span>
            <strong>4,000원</strong>
          </div>
          <div class="detail-info-row">
            <span><i>⌖</i> 거래장소</span>
            <strong>태릉입구역</strong>
          </div>
          <div class="detail-info-row">
            <span><i>◷</i> 모집 마감 시간</span>
            <strong>오늘 18 : 30</strong>
          </div>
        </section>

        <section class="detail-card sale-link-card">
          <h2>실제 판매 페이지</h2>
          <p>실제 상품 링크를 붙여넣어주세요</p>
          <div class="detail-link-box">
            <span>↗</span>
            <a href="#" target="_blank" rel="noreferrer">https</a>
            <button type="button">링크 바로가기</button>
          </div>
        </section>

        <section class="detail-card share-card-box">
          <h2>링크 공유</h2>
          <p>링크를 공유하면 더 많은 분들이 쉽게 참여할 수 있어요!</p>
          <div class="detail-link-box">
            <span>↗</span>
            <input type="text" value="https" readonly />
          </div>
          <div class="share-actions">
            <button type="button"><span>●</span>카카오톡</button>
            <button type="button"><span>◎</span>인스타그램</button>
            <button type="button"><span>↗</span>링크복사</button>
            <button type="button"><span>…</span>더보기</button>
          </div>
        </section>
      </main>

      <footer class="detail-bottom-actions">
        <button class="detail-like-btn heart-btn" type="button">
          ♡ <span>12</span>
        </button>
        <button class="detail-join-btn" type="button">참여하기</button>
      </footer>

      <div class="home-indicator"></div>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
