{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 나눔 개설</title>
    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span><span>⌁</span><span>▭</span>
        </div>
      </header>

      <main class="create-page share-create-page">
        <header class="page-header">
          <a href="{% url 'group_list' %}" class="back-btn">‹</a>
          <h1>나눔 개설</h1>
        </header>

        <form class="create-form" method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <section class="form-card title-card">
            <label class="image-upload" data-image-upload>
              <span class="image-upload-text">사진 추가<br />(최대 5장)</span>
              <img class="image-preview" alt="" hidden />
              <input
                type="file"
                name="images"
                accept="image/*"
                multiple
                hidden
                data-image-input
              />
            </label>
            <div class="title-input-area">
              <div class="input-count-row">
                <input
                  type="text"
                  name="title"
                  maxlength="30"
                  placeholder="나눔 제목을 입력해주세요"
                />
                <span>0 / 30</span>
              </div>
              <textarea
                name="description"
                maxlength="100"
                placeholder="나눔 내용을 입력해주세요&#10;(필수)"
              ></textarea>
              <div class="textarea-count">0 / 100</div>
            </div>
          </section>

          <section class="form-card category-card">
            <div class="card-title-row">
              <h2>카테고리 <span>선택</span></h2>
              <button type="button" class="small-icon-btn" id="categoryOpenBtn">
                ⌕
              </button>
            </div>
            <input
              type="hidden"
              name="category"
              id="categoryInput"
              value="야채"
            />
            <div class="category-list">
              <button
                type="button"
                class="category active"
                data-category="야채"
              >
                ♧ 야채
              </button>
              <button type="button" class="category" data-category="과일">
                ◌ 과일
              </button>
              <button type="button" class="category" data-category="가구">
                ▣ 가구
              </button>
              <button type="button" class="category" data-category="도서">
                ▤ 도서
              </button>
              <button type="button" class="category" data-category="생활">
                ⌂ 생활
              </button>
            </div>
          </section>

          <section class="form-card people-card">
            <div class="people-head">
              <div>
                <h2>물건 개수 <span id="peopleSubText">최대 4개</span></h2>
                <p>나눔 물건 수량을 입력해주세요.</p>
              </div>
              <div class="people-control">
                <button type="button" id="minusBtn">−</button>
                <strong id="peopleCount">4개</strong>
                <button type="button" id="plusBtn">＋</button>
              </div>
            </div>
            <input
              type="range"
              name="quantity"
              min="1"
              max="4"
              value="4"
              id="peopleRange"
              data-unit="개"
            />
          </section>

          <section class="form-card info-card compact-info-card">
            <label class="info-row">
              <span class="info-label"
                ><span class="info-symbol">⌖</span> 거래장소</span
              >
              <input
                class="info-input"
                type="text"
                name="location"
                value="태릉입구역"
              />
            </label>
            <label class="info-row">
              <span class="info-label"
                ><span class="info-symbol">◷</span> 모집 마감 시간</span
              >
              <input
                class="info-input"
                type="text"
                name="deadline"
                value="오늘 18 : 30"
              />
            </label>
          </section>

          <section class="form-card notice-card">
            <h2>ⓘ 주의사항</h2>
            <p>
              나눔 물품 상태와 거래 장소를 꼭 확인해주세요.<br />서로 배려하는
              따뜻한 나눔 문화를 함께 만들어가요.
            </p>
          </section>

          <button class="submit-btn" type="submit">공구 시작하기</button>
          <button class="delete-btn" type="button">취소할게요</button>
        </form>
      </main>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
