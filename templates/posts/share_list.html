{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 나눔</title>
    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span><span>⌁</span><span>▭</span>
        </div>
      </header>

      <main class="home-page">
        <section class="top-search">
          <div class="search-box">
            <input type="text" placeholder="나눔 물품 검색" />
            <button type="button">⌕</button>
          </div>
          <button class="alarm-btn" type="button">♡</button>
        </section>

        <section class="logo-area">
          <img
            class="logo-img"
            src="{% static 'app/images/logo.svg' %}"
            alt="nona"
          />
        </section>

        <nav class="tab-menu">
          <a href="{% url 'group_list' %}">공구</a>
          <a href="{% url 'share_list' %}" class="active">나눔</a>
        </nav>

        <section class="sort-row">
          <button id="sortOpenBtn" type="button">최신순↓</button>
        </section>

        <section class="post-list">
          <article class="post-card">
            <a
              class="post-card-link"
              href="{% url 'posts:share_detail' 1 %}"
              aria-label="나눔 게시물 상세보기"
            ></a>
            <div class="post-image carrot"></div>
            <div class="post-content">
              <span class="badge status-recruiting">나눔중</span>
              <span class="badge green">야채</span>
              <h2>당근 조금 나눔해요</h2>
              <p class="price">무료나눔</p>
              <p class="people">4개</p>
              <div class="post-meta">
                <span>♡ 오늘 18:30</span><span>♙ 태릉입구</span>
              </div>
            </div>
            <button class="heart-btn" type="button" aria-label="찜하기">
              ♡
            </button>
          </article>

          <article class="post-card">
            <a
              class="post-card-link"
              href="{% url 'posts:share_detail' 2 %}"
              aria-label="나눔 게시물 상세보기"
            ></a>
            <div class="post-image tissue"></div>
            <div class="post-content">
              <span class="badge status-closed">마감</span>
              <span class="badge green">생활</span>
              <h2>휴지 몇 롤 나눔합니다</h2>
              <p class="price">무료나눔</p>
              <p class="people">예약 완료</p>
              <div class="post-meta">
                <span>♡ 마감</span><span>♙ 화랑대</span>
              </div>
            </div>
            <button class="heart-btn" type="button" aria-label="찜하기">
              ♡
            </button>
          </article>
        </section>
      </main>

      <div class="write-menu-wrap">
        <div class="write-menu" id="writeMenu">
          <a href="{% url 'group_create' %}" class="write-menu-item">
            <span class="write-menu-icon">♧</span><span>공구 글쓰기</span>
          </a>
          <a href="{% url 'share_create' %}" class="write-menu-item">
            <span class="write-menu-icon">♨</span><span>나눔 글쓰기</span>
          </a>
        </div>
        <button class="floating-btn" id="writeOpenBtn" type="button">＋</button>
      </div>

      <nav class="bottom-nav">
        <a href="#"><span>메시지</span></a>
        <a href="{% url 'group_list' %}" class="active"><span>홈</span></a>
        <a href="#"><span>마이페이지</span></a>
      </nav>

      <div class="dimmed" id="dimmed"></div>
      <section class="bottom-sheet" id="sortSheet">
        <h3>정렬 기준</h3>
        <button
          class="sort-option selected"
          type="button"
          data-sort-label="최신순↓"
        >
          <span>◉ 최신순</span><strong>✓</strong>
        </button>
        <button class="sort-option" type="button" data-sort-label="오래된순↓">
          <span>◷ 오래된 순</span><strong></strong>
        </button>
        <button class="sort-option" type="button" data-sort-label="마감임박순↓">
          <span>⌛ 마감임박순</span><strong></strong>
        </button>
        <button class="cancel-btn" id="sortCloseBtn" type="button">취소</button>
      </section>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
