<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>인증번호 입력</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-neutral-200 p-4">
  <!-- iPhone 16 frame: 393 x 852 -->
  <div class="relative overflow-hidden bg-black shadow-2xl"
       style="width:393px;height:852px;border-radius:55px;padding:12px;">
    <div class="relative h-full w-full overflow-hidden bg-white" style="border-radius:44px;">
      <!-- Dynamic Island -->
      <div class="absolute left-1/2 z-20 -translate-x-1/2 bg-black"
           style="top:11px;width:126px;height:37px;border-radius:20px;"></div>

      <!-- Status bar -->
      <div class="flex items-center justify-between px-8 pt-4 text-[15px] font-semibold text-black">
        <span>12:00</span><span></span>
      </div>

      <div class="flex flex-col px-6 pt-10" style="height:calc(100% - 60px);">
        <!-- back + progress -->
        <div class="flex items-center gap-3">
          <button class="text-neutral-700" onclick="history.back()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <div class="flex flex-1 items-center">
            <div class="h-3 w-3 rounded-full bg-[#c5d49a]"></div>
            <div class="h-px flex-1 bg-[#c5d49a]"></div>
            <div class="h-4 w-4 rounded-full bg-[#a8bf6e]"></div>
            <div class="h-px flex-1 bg-[#c5d49a]"></div>
            <div class="h-3 w-3 rounded-full bg-[#c5d49a]"></div>
          </div>
        </div>

        <!-- Title -->
        <div class="mt-10 text-center">
          <h1 class="text-[20px] font-bold leading-snug text-neutral-800">
            인증번호를<br/>입력해주세요
          </h1>
          <p class="mt-4 text-[13px] text-neutral-500">010-1234-5678로 인증번호를 보냈어요</p>
        </div>

        <!-- OTP inputs -->
        <div class="mt-8 flex justify-between gap-2" id="otp">
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
          <input inputmode="numeric" maxlength="1" class="otp-input h-12 w-12 rounded-xl border-2 border-[#c5d49a] text-center text-lg font-semibold text-neutral-800 outline-none focus:border-[#a8bf6e]" />
        </div>

        <button class="mt-6 w-full rounded-xl bg-[#b8cc8a] py-3.5 text-[14px] font-medium text-white active:opacity-80">
          인증번호 받기
        </button>
        <button class="mt-4 text-center text-[12px] text-neutral-500 underline">
          30초 후 다시 보내기
        </button>
      </div>

      <div class="absolute bottom-2 left-1/2 h-[5px] w-[134px] -translate-x-1/2 rounded-full bg-black"></div>
    </div>
  </div>

<script>
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((el, i) => {
    el.addEventListener('input', e => {
      el.value = el.value.replace(/\D/g,'').slice(-1);
      if (el.value && i < inputs.length - 1) inputs[i+1].focus();
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !el.value && i > 0) inputs[i-1].focus();
    });
    el.addEventListener('paste', e => {
      const t = (e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,6);
      if (!t) return;
      e.preventDefault();
      inputs.forEach((x,j) => x.value = t[j] || '');
      inputs[Math.min(t.length, inputs.length-1)].focus();
    });
  });
</script>
</body>
</html>
