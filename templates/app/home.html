{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 홈</title>

    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span>
          <span>⌁</span>
          <span>▭</span>
        </div>
      </header>

      <main class="home-page">
        <section class="top-search">
          <div class="search-box">
            <input type="text" placeholder="상품 / 공구명 검색" />
            <button type="button">⌕</button>
          </div>
          <button class="alarm-btn" type="button">♡</button>
        </section>

        <section class="logo-area">
          <h1 class="logo-text">nona</h1>
        </section>

        <nav class="tab-menu">
          <a href="#" class="active">공구</a>
          <a href="#">나눔</a>
        </nav>

        <section class="sort-row">
          <button id="sortOpenBtn" type="button">최신순↓</button>
        </section>

        <section class="post-list">
          <article class="post-card">
            <div class="post-image carrot"></div>

            <div class="post-content">
              <span class="badge orange">모집중</span>
              <span class="badge green">야채</span>

              <h2>양배추랑 당근 같이 사요!</h2>
              <p class="price">4,000원</p>
              <p class="people">3 / 4명 참여중</p>

              <div class="progress">
                <span style="width: 75%"></span>
              </div>

              <div class="post-meta">
                <span>♡ 18:30 마감</span>
                <span>♙ 태릉입구</span>
              </div>
            </div>

            <button class="heart-btn" type="button">♡</button>
          </article>

          <article class="post-card">
            <div class="post-image tissue"></div>

            <div class="post-content">
              <span class="badge orange">모집중</span>
              <span class="badge green">생활</span>

              <h2>화장지 30롤 같이 나눠요</h2>
              <p class="price">6,200원</p>
              <p class="people">4 / 6명 참여중</p>

              <div class="progress">
                <span style="width: 66%"></span>
              </div>

              <div class="post-meta">
                <span>♡ 19:30 마감</span>
                <span>♙ 화랑대</span>
              </div>
            </div>

            <button class="heart-btn" type="button">♡</button>
          </article>

          <article class="post-card">
            <div class="post-image egg"></div>

            <div class="post-content">
              <span class="badge orange">모집중</span>
              <span class="badge green">식품</span>

              <h2>무항생제 계란 같이 사요</h2>
              <p class="price">5,500원</p>
              <p class="people">3 / 5명 참여중</p>

              <div class="progress">
                <span style="width: 60%"></span>
              </div>

              <div class="post-meta">
                <span>♡ 18:30 마감</span>
                <span>♙ 태릉입구</span>
              </div>
            </div>

            <button class="heart-btn" type="button">♡</button>
          </article>
        </section>
      </main>

      <a href="{% url 'create' %}" class="floating-btn">＋</a>

      <nav class="bottom-nav">
        <a href="#">
          ♡
          <span>메시지</span>
        </a>

        <a href="#" class="active">
          ⌂
          <span>홈</span>
        </a>

        <a href="#">
          ♙
          <span>마이페이지</span>
        </a>
      </nav>

      <div class="dimmed" id="dimmed"></div>

      <section class="bottom-sheet" id="sortSheet">
        <h3>정렬 기준</h3>

        <button class="sort-option selected" type="button">
          <span>◉ 최신순</span>
          <strong>✓</strong>
        </button>

        <button class="sort-option" type="button">
          <span>◷ 오래된 순</span>
          <strong></strong>
        </button>

        <button class="sort-option" type="button">
          <span>⌛ 마감임박순</span>
          <strong></strong>
        </button>

        <button class="sort-option" type="button">
          <span>↓ 가격 낮은 순</span>
          <strong></strong>
        </button>

        <button class="sort-option" type="button">
          <span>↑ 가격 높은 순</span>
          <strong></strong>
        </button>

        <button class="cancel-btn" id="sortCloseBtn" type="button">취소</button>
      </section>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
