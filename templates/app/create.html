{% load static %}

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nona - 공구 개설</title>

    <link rel="stylesheet" href="{% static 'app/css/nona.css' %}" />
  </head>
  <body>
    <div class="mobile-wrap">
      <header class="status-bar">
        <span>12:00</span>
        <div class="status-icons">
          <span>▮</span>
          <span>⌁</span>
          <span>▭</span>
        </div>
      </header>

      <main class="create-page">
        <header class="page-header">
          <a href="{% url 'home' %}" class="back-btn">‹</a>
          <h1>공구 개설</h1>
        </header>

        <form class="create-form">
          <section class="form-card title-card">
            <button type="button" class="image-upload">
              사진 추가<br />
              <span>(최대 5장)</span>
            </button>

            <div class="title-input-area">
              <div class="input-count-row">
                <input
                  type="text"
                  maxlength="30"
                  placeholder="공구 제목을 입력해주세요"
                />
                <span>0 / 30</span>
              </div>

              <textarea
                maxlength="100"
                placeholder="유통기한과 구매수량을 입력해주세요&#10;(필수)"
              ></textarea>

              <div class="textarea-count">0 / 100</div>
            </div>
          </section>

          <section class="form-card">
            <div class="card-title-row">
              <div>
                <h2>카테고리 선택</h2>
              </div>

              <button type="button" class="small-icon-btn">⌕</button>
            </div>

            <div class="category-list">
              <button type="button" class="category active">✾ 야채</button>
              <button type="button" class="category">🍎 과일</button>
              <button type="button" class="category">▣ 가구</button>
              <button type="button" class="category">▤ 도서</button>
              <button type="button" class="category">⌂ 의류</button>
            </div>
          </section>

          <section class="form-card people-card">
            <div class="people-head">
              <div>
                <h2>최소 모집인원 <span>4명 모집</span></h2>
                <p>조건이 되면 자동으로 모집은 마감돼요.</p>
              </div>

              <div class="people-control">
                <button type="button" id="minusBtn">−</button>
                <strong id="peopleCount">4명</strong>
                <button type="button" id="plusBtn">＋</button>
              </div>
            </div>

            <input type="range" min="2" max="10" value="4" id="peopleRange" />
          </section>

          <section class="form-card info-card">
            <button type="button" class="info-row">
              <span>▤ 1/N 금액</span>
              <strong>4,000원</strong>
            </button>

            <button type="button" class="info-row">
              <span>♙ 거래장소</span>
              <strong>태릉입구역 ›</strong>
            </button>

            <button type="button" class="info-row">
              <span>⏰ 모집마감 시간</span>
              <strong>오늘 18 : 30</strong>
            </button>
          </section>

          <section class="form-card link-card">
            <h2>실제 판매 링크</h2>
            <p>실제 상품 링크를 붙여주세요.</p>

            <div class="link-input-box">
              <input type="url" placeholder="https" />
              <button type="button">링크 붙여넣기</button>
            </div>
          </section>

          <button class="submit-btn" type="submit">공구 시작하기</button>
          <button class="delete-btn" type="button">취소할게요</button>
        </form>
      </main>
    </div>

    <script src="{% static 'app/js/nona.js' %}"></script>
  </body>
</html>
